codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 5%
        base: auto
        paths:
          - "cmd"
          - "internal"
        exclude:
          - "internal/grpcapi/v1/*.pb.go"
    patch:
      default:
        target: 80%
        threshold: 5%
        base: auto
        paths:
          - "cmd"
          - "internal"
        exclude:
          - "internal/grpcapi/v1/*.pb.go"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no

ignore:
  - "internal/grpcapi/v1/*.pb.go"
  - "web/**/*"
  - "**/node_modules/**"
  - "**/*_test.go"
  - "**/test/**"
  - "**/mock/**"
