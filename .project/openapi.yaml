openapi: "3.0.3"
info:
  title: AnubisWatch API
  description: |
    REST API for AnubisWatch — zero-dependency uptime and synthetic monitoring platform.

    **Authentication:** Most endpoints require a Bearer token obtained via `/api/v1/auth/login`.
    Include the token in the `Authorization: Bearer <token>` header.
  version: "4.0.0"
  contact:
    name: AnubisWatch
  license:
    name: MIT

servers:
  - url: "http://localhost:8080"
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: healthy }
                  timestamp: { type: string, format: date-time }

  /ready:
    get:
      summary: Readiness check
      tags: [System]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
                  timestamp: { type: string, format: date-time }

  /metrics:
    get:
      summary: Prometheus metrics
      tags: [System]
      responses:
        "200":
          description: Prometheus-compatible metrics
          content:
            text/plain:
              schema: { type: string }

  /api/v1/auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  token: { type: string }
        "401":
          description: Invalid credentials

  /api/v1/auth/logout:
    post:
      summary: Log out current user
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Logout successful

  /api/v1/auth/me:
    get:
      summary: Get current user info
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /api/v1/souls:
    get:
      summary: List souls
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, max: 100 } }
      responses:
        "200":
          description: Paginated list of souls
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedSouls" }
    post:
      summary: Create a soul
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Soul" }
      responses:
        "201":
          description: Soul created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Soul" }

  /api/v1/souls/{id}:
    get:
      summary: Get soul by ID
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Soul details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Soul" }
        "404":
          description: Soul not found
    put:
      summary: Update soul
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Soul" }
      responses:
        "200":
          description: Soul updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Soul" }
    delete:
      summary: Delete soul
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Soul deleted

  /api/v1/souls/{id}/check:
    post:
      summary: Force an immediate health check
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Judgment" }

  /api/v1/souls/{id}/judgments:
    get:
      summary: List judgments for a soul
      tags: [Judgments]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: List of judgments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Judgment" }

  /api/v1/channels:
    get:
      summary: List alert channels
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Paginated list of channels
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedChannels" }
    post:
      summary: Create alert channel
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertChannel" }
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertChannel" }

  /api/v1/channels/{id}:
    get:
      summary: Get channel by ID
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Channel details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertChannel" }
    put:
      summary: Update channel
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertChannel" }
      responses:
        "200":
          description: Channel updated
    delete:
      summary: Delete channel
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Channel deleted

  /api/v1/channels/{id}/test:
    post:
      summary: Send test notification
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Test notification sent

  /api/v1/rules:
    get:
      summary: List alert rules
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Paginated list of rules
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedRules" }
    post:
      summary: Create alert rule
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRule" }
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }

  /api/v1/rules/{id}:
    get:
      summary: Get rule by ID
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Rule details
    put:
      summary: Update rule
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRule" }
      responses:
        "200":
          description: Rule updated
    delete:
      summary: Delete rule
      tags: [Alerts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Rule deleted

  /api/v1/incidents:
    get:
      summary: List active incidents
      tags: [Incidents]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of active incidents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Incident" }

  /api/v1/incidents/{id}/acknowledge:
    post:
      summary: Acknowledge an incident
      tags: [Incidents]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Incident acknowledged

  /api/v1/incidents/{id}/resolve:
    post:
      summary: Resolve an incident
      tags: [Incidents]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Incident resolved

  /api/v1/workspaces:
    get:
      summary: List workspaces
      tags: [Workspaces]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workspace" }
    post:
      summary: Create workspace
      tags: [Workspaces]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Workspace" }
      responses:
        "201":
          description: Workspace created

  /api/v1/workspaces/{id}:
    get:
      summary: Get workspace by ID
      tags: [Workspaces]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Workspace details
    put:
      summary: Update workspace
      tags: [Workspaces]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Workspace updated
    delete:
      summary: Delete workspace
      tags: [Workspaces]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Workspace deleted

  /api/v1/stats:
    get:
      summary: Get statistics
      tags: [Stats]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Statistics data

  /api/v1/stats/overview:
    get:
      summary: Get stats overview
      tags: [Stats]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Stats overview

  /api/v1/cluster/status:
    get:
      summary: Get cluster status
      tags: [Cluster]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Cluster status

  /api/v1/cluster/peers:
    get:
      summary: Get cluster peers
      tags: [Cluster]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Cluster peers

  /api/v1/config:
    get:
      summary: Get server configuration
      tags: [Config]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Server configuration
    put:
      summary: Update configuration (in-memory only)
      tags: [Config]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Configuration updated

  /api/v1/status-pages:
    get:
      summary: List status pages
      tags: [Status Pages]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of status pages
    post:
      summary: Create status page
      tags: [Status Pages]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Status page created

  /api/v1/status-pages/{id}:
    get:
      summary: Get status page
      tags: [Status Pages]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Status page details
    put:
      summary: Update status page
      tags: [Status Pages]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Status page updated
    delete:
      summary: Delete status page
      tags: [Status Pages]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Status page deleted

  /api/v1/journeys:
    get:
      summary: List journeys
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of journeys
    post:
      summary: Create journey
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Journey created

  /api/v1/journeys/{id}:
    get:
      summary: Get journey
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Journey details
    put:
      summary: Update journey
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Journey updated
    delete:
      summary: Delete journey
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Journey deleted

  /api/v1/journeys/{id}/run:
    post:
      summary: Run a journey
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Journey run started

  /api/v1/journeys/{id}/runs:
    get:
      summary: List journey runs
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: List of journey runs

  /api/v1/journeys/{id}/runs/{runId}:
    get:
      summary: Get journey run details
      tags: [Journeys]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Journey run details

  /api/v1/maintenance:
    get:
      summary: List maintenance windows
      tags: [Maintenance]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of maintenance windows
    post:
      summary: Create maintenance window
      tags: [Maintenance]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Maintenance window created

  /api/v1/maintenance/{id}:
    get:
      summary: Get maintenance window
      tags: [Maintenance]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Maintenance window details
    put:
      summary: Update maintenance window
      tags: [Maintenance]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Maintenance window updated
    delete:
      summary: Delete maintenance window
      tags: [Maintenance]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Maintenance window deleted

  /api/v1/dashboards:
    get:
      summary: List custom dashboards
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of dashboards
    post:
      summary: Create dashboard
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Dashboard created

  /api/v1/dashboards/{id}:
    get:
      summary: Get dashboard
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Dashboard details
    put:
      summary: Update dashboard
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Dashboard updated
    delete:
      summary: Delete dashboard
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Dashboard deleted

  /api/v1/dashboards/{id}/query:
    post:
      summary: Query dashboard widgets
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Query results

  /api/v1/dashboards/templates:
    get:
      summary: Get dashboard templates
      tags: [Dashboards]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of templates

  /api/v1/mcp:
    post:
      summary: Model Context Protocol endpoint
      tags: [MCP]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: MCP response

  /api/v1/mcp/tools:
    get:
      summary: List available MCP tools
      tags: [MCP]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: List of MCP tools

  /api/v1/souls/{id}/logs:
    get:
      summary: Get soul logs
      tags: [Souls]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Soul logs

  /ws:
    get:
      summary: WebSocket connection for real-time updates
      tags: [WebSocket]
      responses:
        "101":
          description: WebSocket upgrade successful

  /api/v1/events:
    get:
      summary: Server-Sent Events stream
      tags: [SSE]
      responses:
        "200":
          description: SSE stream

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string }
        workspace: { type: string }
        created_at: { type: string, format: date-time }

    Soul:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        target: { type: string }
        type: { type: string, enum: [http, tcp, udp, dns, smtp, imap, icmp, grpc, websocket, tls] }
        status: { type: string, enum: [alive, dead, degraded, unknown, embalmed] }
        timeout: { type: string }
        interval: { type: string }
        workspace_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Judgment:
      type: object
      properties:
        id: { type: string }
        soul_id: { type: string }
        status: { type: string }
        duration: { type: string }
        timestamp: { type: string, format: date-time }
        message: { type: string }
        status_code: { type: integer }
        details: { $ref: "#/components/schemas/JudgmentDetails" }

    JudgmentDetails:
      type: object
      properties:
        response_headers: { type: object, additionalProperties: { type: string } }
        response_body: { type: string }
        assertions:
          type: array
          items: { $ref: "#/components/schemas/AssertionResult" }

    AssertionResult:
      type: object
      properties:
        type: { type: string }
        expected: { type: string }
        actual: { type: string }
        passed: { type: boolean }

    AlertChannel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [webhook, email, slack, discord, pagerduty] }
        config: { type: object }
        workspace_id: { type: string }
        created_at: { type: string, format: date-time }

    AlertRule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        condition: { type: string }
        channel_id: { type: string }
        workspace_id: { type: string }
        created_at: { type: string, format: date-time }

    Incident:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        severity: { type: string }
        status: { type: string }
        soul_id: { type: string }
        started_at: { type: string, format: date-time }

    Workspace:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }

    Pagination:
      type: object
      properties:
        total: { type: integer }
        offset: { type: integer }
        limit: { type: integer }
        has_more: { type: boolean }
        next_offset: { type: integer }

    PaginatedSouls:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Soul" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    PaginatedChannels:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AlertChannel" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    PaginatedRules:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AlertRule" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    Error:
      type: object
      properties:
        error: { type: string }
