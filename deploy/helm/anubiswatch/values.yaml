# Default values for anubiswatch.
replicaCount: 1

image:
  repository: ghcr.io/anubiswatch/anubiswatch
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  clusterPort: 7946

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: anubiswatch.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

statefulSet:
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  clusterPort: 7946

config:
  server:
    port: 8080
    tls: false
    dashboard_enabled: true
    cors_origins: ["*"]

  auth:
    type: local
    admin_email: admin@anubiswatch.local
    session_ttl: 24h

  storage:
    data_dir: /data
    encryption_enabled: false

  probe:
    max_concurrent: 100
    queue_size: 1000
    timeout_multiplier: 1.5
    default_interval: 60s

  raft:
    enabled: false

  logging:
    level: info
    format: json

secrets:
  adminPassword: "admin"
  encryptionKey: ""
  clusterSecret: ""

nodeSelector: {}

tolerations: []

affinity: {}
