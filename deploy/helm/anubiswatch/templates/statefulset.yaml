apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "anubiswatch.fullname" . }}
  labels:
    {{- include "anubiswatch.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "anubiswatch.fullname" . }}-headless
  replicas: {{ .Values.statefulSet.replicas }}
  podManagementPolicy: {{ .Values.statefulSet.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.statefulSet.updateStrategy.type }}
  selector:
    matchLabels:
      {{- include "anubiswatch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "anubiswatch.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: anubis
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/anubis
          args:
            - serve
            - --config
            - /etc/anubis/anubis.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: raft
              containerPort: 7946
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/anubis
              readOnly: true
            - name: data
              mountPath: {{ .Values.config.dataDir }}
          env:
            - name: ANUBIS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ANUBIS_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
      volumes:
        - name: config
          configMap:
            name: {{ include "anubiswatch.configName" . }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
