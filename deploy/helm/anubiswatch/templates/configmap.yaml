apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "anubiswatch.fullname" . }}-config
  labels:
    {{- include "anubiswatch.labels" . | nindent 4 }}
data:
  anubis.yaml: |
    server:
      port: {{ .Values.config.server.port }}
      tls: {{ .Values.config.server.tls }}
      dashboard_enabled: {{ .Values.config.server.dashboard_enabled }}
      cors_origins: {{ .Values.config.server.cors_origins | toJson }}

    auth:
      type: {{ .Values.config.auth.type }}
      admin_email: {{ .Values.config.auth.admin_email }}
      session_ttl: {{ .Values.config.auth.session_ttl }}

    storage:
      data_dir: {{ .Values.config.storage.data_dir }}
      encryption_enabled: {{ .Values.config.storage.encryption_enabled }}

    probe:
      max_concurrent: {{ .Values.config.probe.max_concurrent }}
      queue_size: {{ .Values.config.probe.queue_size }}
      timeout_multiplier: {{ .Values.config.probe.timeout_multiplier }}
      default_interval: {{ .Values.config.probe.default_interval }}

    raft:
      enabled: {{ .Values.config.raft.enabled }}

    logging:
      level: {{ .Values.config.logging.level }}
      format: {{ .Values.config.logging.format }}
