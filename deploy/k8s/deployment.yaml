apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubiswatch
  namespace: anubiswatch
  labels:
    app.kubernetes.io/name: anubiswatch
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anubiswatch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anubiswatch
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: anubiswatch
          image: ghcr.io/anubiswatch/anubiswatch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: ANUBIS_CONFIG
              value: /etc/anubis/anubis.yaml
            - name: ANUBIS_DATA_DIR
              value: /data
            - name: ANUBIS_LOG_LEVEL
              value: info
            - name: ANUBIS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anubiswatch-secrets
                  key: admin-password
          volumeMounts:
            - name: config
              mountPath: /etc/anubis
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: anubiswatch-config
        - name: data
          persistentVolumeClaim:
            claimName: anubiswatch-data
