version: '3.8'

services:
  anubis-1:
    image: anubiswatch/anubis:latest
    container_name: anubis-1
    hostname: anubis-1
    command:
      - serve
      - --bootstrap
    ports:
      - "8080:8080"
      - "7946:7946"
    environment:
      ANUBIS_NODE_ID: anubis-1
      ANUBIS_DATA_DIR: /data
      ANUBIS_LOG_LEVEL: info
    volumes:
      - anubis-data-1:/data
      - ./anubis.yaml:/etc/anubis/anubis.yaml:ro
    networks:
      - anubis-network
    healthcheck:
      test: ["CMD", "/bin/anubis", "judge"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  anubis-2:
    image: anubiswatch/anubis:latest
    container_name: anubis-2
    hostname: anubis-2
    command:
      - serve
      - --join
      - "anubis-1:7946"
    ports:
      - "8081:8080"
      - "7947:7946"
    environment:
      ANUBIS_NODE_ID: anubis-2
      ANUBIS_DATA_DIR: /data
      ANUBIS_LOG_LEVEL: info
    volumes:
      - anubis-data-2:/data
      - ./anubis.yaml:/etc/anubis/anubis.yaml:ro
    networks:
      - anubis-network
    depends_on:
      anubis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/anubis", "judge"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  anubis-3:
    image: anubiswatch/anubis:latest
    container_name: anubis-3
    hostname: anubis-3
    command:
      - serve
      - --join
      - "anubis-1:7946"
    ports:
      - "8082:8080"
      - "7948:7946"
    environment:
      ANUBIS_NODE_ID: anubis-3
      ANUBIS_DATA_DIR: /data
      ANUBIS_LOG_LEVEL: info
    volumes:
      - anubis-data-3:/data
      - ./anubis.yaml:/etc/anubis/anubis.yaml:ro
    networks:
      - anubis-network
    depends_on:
      anubis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/anubis", "judge"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: PostgreSQL for external data storage
  postgres:
    image: postgres:16-alpine
    container_name: anubis-postgres
    environment:
      POSTGRES_USER: anubis
      POSTGRES_PASSWORD: anubis_secret
      POSTGRES_DB: anubis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - anubis-network
    restart: unless-stopped
    profiles:
      - postgres

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: anubis-redis
    networks:
      - anubis-network
    restart: unless-stopped
    profiles:
      - redis

volumes:
  anubis-data-1:
    driver: local
  anubis-data-2:
    driver: local
  anubis-data-3:
    driver: local
  postgres-data:
    driver: local

networks:
  anubis-network:
    driver: bridge
