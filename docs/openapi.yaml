openapi: 3.1.0
info:
  title: AnubisWatch API
  description: |
    AnubisWatch REST API - The Judgment Never Sleeps

    This API provides full access to AnubisWatch monitoring capabilities including:
    - Soul (monitor) management
    - Judgment (check) history
    - Alert channels and rules
    - Status pages
    - Cluster management

    ## Authentication

    All API endpoints except `/health`, `/ready`, and `/api/v1/auth/login` require Bearer token authentication.

    ### Getting a Token

    ```bash
    curl -X POST http://localhost:8443/api/v1/auth/login \
      -H "Content-Type: application/json" \
      -d '{"email":"admin@example.com","password":"secret"}'
    ```

    ### Using the Token

    ```bash
    curl http://localhost:8443/api/v1/souls \
      -H "Authorization: Bearer YOUR_TOKEN"
    ```

    ## Base URL

    - Default: `http://localhost:8443`
    - Production: Configure via `ANUBIS_HOST` and `ANUBIS_PORT` environment variables
  version: 1.0.0
  contact:
    name: AnubisWatch
    url: https://github.com/AnubisWatch/anubiswatch
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8443
    description: Local development server
  - url: https://localhost:8443
    description: Local development server (HTTPS)
  - url: https://anubis.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Souls
    description: Monitored targets (HTTP, TCP, DNS, etc.)
  - name: Judgments
    description: Check results and history
  - name: Alert Channels
    description: Notification channel configuration
  - name: Alert Rules
    description: Alert conditions and routing
  - name: Status Pages
    description: Public status page configuration
  - name: Incidents
    description: Active incident management
  - name: Cluster
    description: Raft cluster status and management
  - name: Health
    description: Health check endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the server
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns the readiness status of the server
      operationId: getReady
      responses:
        '200':
          description: Server is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticate and receive an access token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: Invalidate the current session
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful logout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Returns the currently authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/souls:
    get:
      tags:
        - Souls
      summary: List souls
      description: Retrieve a paginated list of souls (monitors)
      operationId: listSouls
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: workspace
          in: query
          schema:
            type: string
          description: Filter by workspace ID
      responses:
        '200':
          description: List of souls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Soul'
    post:
      tags:
        - Souls
      summary: Create soul
      description: Create a new soul (monitor)
      operationId: createSoul
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoulInput'
      responses:
        '201':
          description: Soul created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/souls/{id}:
    get:
      tags:
        - Souls
      summary: Get soul
      description: Retrieve a soul by ID
      operationId: getSoul
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Soul details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '404':
          description: Soul not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Souls
      summary: Update soul
      description: Update an existing soul
      operationId: updateSoul
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoulInput'
      responses:
        '200':
          description: Soul updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '404':
          description: Soul not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Souls
      summary: Delete soul
      description: Delete a soul
      operationId: deleteSoul
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Soul deleted
        '404':
          description: Soul not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/souls/{id}/check:
    post:
      tags:
        - Souls
      summary: Force check
      description: Trigger an immediate check for a soul
      operationId: forceCheck
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Judgment'

  /api/v1/souls/{id}/judgments:
    get:
      tags:
        - Souls
      summary: List judgments
      description: Get check history for a soul
      operationId: listJudgments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: start
          in: query
          schema:
            type: string
            format: date-time
          description: Start time for history range
        - name: end
          in: query
          schema:
            type: string
            format: date-time
          description: End time for history range
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of results
      responses:
        '200':
          description: List of judgments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Judgment'

  /api/v1/channels:
    get:
      tags:
        - Alert Channels
      summary: List channels
      description: List all alert channels
      operationId: listChannels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertChannel'
    post:
      tags:
        - Alert Channels
      summary: Create channel
      description: Create a new alert channel
      operationId: createChannel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertChannelInput'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannel'

  /api/v1/channels/{id}/test:
    post:
      tags:
        - Alert Channels
      summary: Test channel
      description: Send a test notification to a channel
      operationId: testChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Test notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/v1/rules:
    get:
      tags:
        - Alert Rules
      summary: List rules
      description: List all alert rules
      operationId: listRules
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertRule'
    post:
      tags:
        - Alert Rules
      summary: Create rule
      description: Create a new alert rule
      operationId: createRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleInput'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRule'

  /api/v1/status-pages:
    get:
      tags:
        - Status Pages
      summary: List status pages
      description: List all status pages
      operationId: listStatusPages
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of status pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatusPage'
    post:
      tags:
        - Status Pages
      summary: Create status page
      description: Create a new status page
      operationId: createStatusPage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusPageInput'
      responses:
        '201':
          description: Status page created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusPage'

  /api/v1/incidents:
    get:
      tags:
        - Incidents
      summary: List incidents
      description: List active incidents
      operationId: listIncidents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Incident'

  /api/v1/incidents/{id}/acknowledge:
    post:
      tags:
        - Incidents
      summary: Acknowledge incident
      description: Acknowledge an incident
      operationId: acknowledgeIncident
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Incident acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: acknowledged

  /api/v1/incidents/{id}/resolve:
    post:
      tags:
        - Incidents
      summary: Resolve incident
      description: Resolve an incident
      operationId: resolveIncident
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Incident resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: resolved

  /api/v1/cluster/status:
    get:
      tags:
        - Cluster
      summary: Get cluster status
      description: Get the current Raft cluster status
      operationId: getClusterStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cluster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'

  /api/v1/stats:
    get:
      tags:
        - Health
      summary: Get stats
      description: Get comprehensive monitoring statistics
      operationId: getStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token received from /api/v1/auth/login

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
      description: Number of items to skip
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Maximum number of items to return

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, ready]
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: logged out

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]
        workspace:
          type: string
        created_at:
          type: string
          format: date-time

    Soul:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, dns, icmp, smtp, grpc, ws, tls]
        target:
          type: string
        weight:
          type: integer
          description: Check interval in milliseconds
        timeout:
          type: integer
          description: Timeout in milliseconds
        enabled:
          type: boolean
        tags:
          type: array
          items:
            type: string
        http:
          $ref: '#/components/schemas/HTTPConfig'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SoulInput:
      type: object
      required:
        - name
        - type
        - target
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, dns, icmp, smtp, grpc, ws, tls]
        target:
          type: string
        weight:
          type: integer
        timeout:
          type: integer
        enabled:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string
        http:
          $ref: '#/components/schemas/HTTPConfig'

    HTTPConfig:
      type: object
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
          default: GET
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        valid_status:
          type: array
          items:
            type: integer
        body_contains:
          type: string
        feather:
          type: integer
          description: Max latency budget in milliseconds

    Judgment:
      type: object
      properties:
        id:
          type: string
        soul_id:
          type: string
        status:
          type: string
          enum: [alive, degraded, dead, unknown]
        latency_ms:
          type: number
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          $ref: '#/components/schemas/JudgmentDetails'

    JudgmentDetails:
      type: object
      properties:
        status_code:
          type: integer
        tls_info:
          $ref: '#/components/schemas/TLSInfo'
        assertions:
          type: array
          items:
            $ref: '#/components/schemas/AssertionResult'

    TLSInfo:
      type: object
      properties:
        version:
          type: string
        cipher_suite:
          type: string
        expiry:
          type: string
          format: date-time
        issuer:
          type: string

    AssertionResult:
      type: object
      properties:
        name:
          type: string
        passed:
          type: boolean
        message:
          type: string

    AlertChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [webhook, slack, discord, telegram, email, pagerduty, opsgenie, sms, ntfy]
        enabled:
          type: boolean
        config:
          type: object

    AlertChannelInput:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [webhook, slack, discord, telegram, email, pagerduty, opsgenie, sms, ntfy]
        enabled:
          type: boolean
          default: true
        config:
          type: object

    AlertRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        condition:
          $ref: '#/components/schemas/AlertCondition'
        severity:
          type: string
          enum: [critical, high, medium, low]
        channels:
          type: array
          items:
            type: string
        cooldown:
          type: integer
          description: Cooldown in milliseconds

    AlertRuleInput:
      type: object
      required:
        - name
        - condition
      properties:
        name:
          type: string
        enabled:
          type: boolean
          default: true
        condition:
          $ref: '#/components/schemas/AlertCondition'
        severity:
          type: string
          enum: [critical, high, medium, low]
        channels:
          type: array
          items:
            type: string
        cooldown:
          type: integer

    AlertCondition:
      type: object
      properties:
        type:
          type: string
          enum: [consecutive_failures, threshold, percentage, anomaly]
        threshold:
          type: integer
        window:
          type: integer
          description: Time window in milliseconds

    StatusPage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        custom_domain:
          type: string
        theme:
          $ref: '#/components/schemas/StatusPageTheme'
        visibility:
          type: string
          enum: [public, private, protected]
        enabled:
          type: boolean
        souls:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            $ref: '#/components/schemas/StatusGroup'

    StatusPageInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        custom_domain:
          type: string
        theme:
          $ref: '#/components/schemas/StatusPageTheme'
        visibility:
          type: string
          enum: [public, private, protected]
          default: public
        enabled:
          type: boolean
          default: true
        souls:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            $ref: '#/components/schemas/StatusGroup'

    StatusPageTheme:
      type: object
      properties:
        primary_color:
          type: string
        background_color:
          type: string
        text_color:
          type: string
        accent_color:
          type: string
        font_family:
          type: string

    StatusGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        soul_ids:
          type: array
          items:
            type: string

    Incident:
      type: object
      properties:
        id:
          type: string
        soul_id:
          type: string
        soul_name:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        status:
          type: string
          enum: [open, acknowledged, resolved]
        started_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    ClusterStatus:
      type: object
      properties:
        is_clustered:
          type: boolean
        node_id:
          type: string
        state:
          type: string
          enum: [standalone, leader, follower, candidate]
        leader:
          type: string
        term:
          type: integer
        peer_count:
          type: integer

    Stats:
      type: object
      properties:
        total_souls:
          type: integer
        souls_by_status:
          type: object
          properties:
            alive:
              type: integer
            degraded:
              type: integer
            dead:
              type: integer
        total_judgments_24h:
          type: integer
        active_incidents:
          type: integer
        cluster_nodes:
          type: integer

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type: integer
        details:
          type: object
