openapi: 3.0.3
info:
  title: AnubisWatch API
  description: |
    Zero-dependency uptime and synthetic monitoring platform API.

    ## Authentication
    All API endpoints require authentication via Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-token>
    ```

    ## Rate Limiting
    API requests are rate limited per IP and per user:
    - 100 requests/minute for standard endpoints
    - 10 requests/minute for authentication endpoints
    - 20 requests/minute for sensitive operations

    Rate limit headers are included in responses:
    - `X-RateLimit-Limit`: Maximum requests allowed
    - `X-RateLimit-Remaining`: Remaining requests in window
    - `X-RateLimit-Reset`: Unix timestamp when limit resets
  version: 3.0.0
  contact:
    name: AnubisWatch Team
    url: https://anubis.watch
    email: team@anubis.watch
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.anubis.watch/api/v1
    description: Production server

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Souls
    description: Monitored targets management
  - name: Judgments
    description: Health check results
  - name: Alerts
    description: Alert channels and rules
  - name: Cluster
    description: Raft cluster management
  - name: Journeys
    description: Multi-step synthetic monitoring
  - name: Status Pages
    description: Public status page configuration
  - name: System
    description: System health and metrics

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate a user and return a JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate the current authentication token
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Retrieve information about the currently authenticated user
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /souls:
    get:
      tags:
        - Souls
      summary: List souls
      description: Retrieve a paginated list of monitored souls
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of souls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSouls'

    post:
      tags:
        - Souls
      summary: Create soul
      description: Create a new monitored soul
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoulCreate'
      responses:
        '201':
          description: Soul created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /souls/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      tags:
        - Souls
      summary: Get soul
      description: Retrieve a specific soul by ID
      responses:
        '200':
          description: Soul details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags:
        - Souls
      summary: Update soul
      description: Update an existing soul
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoulUpdate'
      responses:
        '200':
          description: Soul updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soul'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags:
        - Souls
      summary: Delete soul
      description: Delete a soul and stop monitoring
      responses:
        '204':
          description: Soul deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

  /souls/{id}/check:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      tags:
        - Souls
      summary: Force check
      description: Immediately check a soul's health status
      responses:
        '200':
          description: Check initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Judgment'

  /souls/{id}/judgments:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      tags:
        - Judgments
      summary: List judgments
      description: Retrieve health check results for a soul
      parameters:
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of judgments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Judgment'

  /judgments:
    get:
      tags:
        - Judgments
      summary: List all judgments
      description: Retrieve recent health check results across all souls
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of judgments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Judgment'

  /alerts/channels:
    get:
      tags:
        - Alerts
      summary: List alert channels
      description: Retrieve all configured alert channels
      responses:
        '200':
          description: List of alert channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertChannel'

    post:
      tags:
        - Alerts
      summary: Create alert channel
      description: Create a new alert channel (email, webhook, slack, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertChannelCreate'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannel'

  /alerts/rules:
    get:
      tags:
        - Alerts
      summary: List alert rules
      description: Retrieve all configured alert rules
      responses:
        '200':
          description: List of alert rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertRule'

    post:
      tags:
        - Alerts
      summary: Create alert rule
      description: Create a new alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleCreate'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRule'

  /cluster/status:
    get:
      tags:
        - Cluster
      summary: Cluster status
      description: Retrieve the current cluster status and node information
      responses:
        '200':
          description: Cluster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'

  /cluster/peers:
    get:
      tags:
        - Cluster
      summary: List peers
      description: Retrieve information about all cluster peers
      responses:
        '200':
          description: List of peers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Peer'

  /journeys:
    get:
      tags:
        - Journeys
      summary: List journeys
      description: Retrieve all configured synthetic monitoring journeys
      responses:
        '200':
          description: List of journeys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Journey'

    post:
      tags:
        - Journeys
      summary: Create journey
      description: Create a new multi-step synthetic monitoring journey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JourneyCreate'
      responses:
        '201':
          description: Journey created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journey'

  /journeys/{id}/run:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      tags:
        - Journeys
      summary: Run journey
      description: Execute a synthetic monitoring journey immediately
      responses:
        '200':
          description: Journey execution started
          content:
            application/json:
              schema:
                type: object
                properties:
                  journey_id:
                    type: string
                  status:
                    type: string
                    example: execution_requested

  /status-pages:
    get:
      tags:
        - Status Pages
      summary: List status pages
      description: Retrieve all configured public status pages
      responses:
        '200':
          description: List of status pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatusPage'

    post:
      tags:
        - Status Pages
      summary: Create status page
      description: Create a new public status page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusPageCreate'
      responses:
        '201':
          description: Status page created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusPage'

  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Check if the API is healthy
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      tags:
        - System
      summary: Readiness check
      description: Check if the API is ready to accept requests
      security: []
      responses:
        '200':
          description: API is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                  checks:
                    type: object

  /metrics:
    get:
      tags:
        - System
      summary: Prometheus metrics
      description: Retrieve Prometheus-formatted metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, user, viewer]
        workspace:
          type: string
        created_at:
          type: string
          format: date-time

    Soul:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, dns, smtp, icmp, grpc, websocket, tls]
        target:
          type: string
        status:
          type: string
          enum: [alive, dead, degraded, unknown, embalmed]
        weight:
          type: integer
        timeout:
          type: integer
        interval:
          type: integer
        http_config:
          $ref: '#/components/schemas/HTTPConfig'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SoulCreate:
      type: object
      required:
        - name
        - type
        - target
      properties:
        name:
          type: string
        type:
          type: string
        target:
          type: string
        weight:
          type: integer
        timeout:
          type: integer
        interval:
          type: integer
        http_config:
          $ref: '#/components/schemas/HTTPConfig'

    SoulUpdate:
      allOf:
        - $ref: '#/components/schemas/SoulCreate'

    HTTPConfig:
      type: object
      properties:
        method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        valid_status:
          type: array
          items:
            type: integer
        follow_redirects:
          type: boolean
        verify_tls:
          type: boolean

    Judgment:
      type: object
      properties:
        id:
          type: string
        soul_id:
          type: string
        status:
          type: string
          enum: [pass, fail]
        latency_ms:
          type: integer
        timestamp:
          type: string
          format: date-time
        error:
          type: string

    AlertChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [email, webhook, slack, discord, pagerduty]
        config:
          type: object
        enabled:
          type: boolean

    AlertChannelCreate:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: object
        enabled:
          type: boolean
          default: true

    AlertRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        condition:
          type: string
        channels:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    AlertRuleCreate:
      type: object
      required:
        - name
        - condition
      properties:
        name:
          type: string
        condition:
          type: string
        channels:
          type: array
          items:
            type: string
        enabled:
          type: boolean
          default: true

    ClusterStatus:
      type: object
      properties:
        is_clustered:
          type: boolean
        node_id:
          type: string
        state:
          type: string
        leader:
          type: string
        term:
          type: integer
        peer_count:
          type: integer

    Peer:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        region:
          type: string
        role:
          type: string
        last_contact:
          type: string
          format: date-time

    Journey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/JourneyStep'
        enabled:
          type: boolean

    JourneyCreate:
      type: object
      required:
        - name
        - steps
      properties:
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/JourneyStep'
        enabled:
          type: boolean
          default: true

    JourneyStep:
      type: object
      properties:
        name:
          type: string
        target:
          type: string
        method:
          type: string
        assertions:
          type: array
          items:
            type: object

    StatusPage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        souls:
          type: array
          items:
            type: string

    StatusPageCreate:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        souls:
          type: array
          items:
            type: string

    PaginatedSouls:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Soul'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        next_offset:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: integer

  responses:
    BadRequestError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    RateLimitError:
      description: Too many requests
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
