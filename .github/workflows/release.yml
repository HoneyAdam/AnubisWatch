name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  security-events: write

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
            goarm: '7'
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: freebsd
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build dashboard (if exists)
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm run build
            echo "Dashboard built successfully"
          else
            echo "No web/dashboard found (web/package.json missing), skipping dashboard build"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-s -w -X github.com/AnubisWatch/anubiswatch/internal/core.Version=${{ github.ref_name }}" \
            -o anubis-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} \
            ./cmd/anubis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anubis-${{ matrix.os }}-${{ matrix.arch }}
          path: anubis-${{ matrix.os }}-${{ matrix.arch }}*

      - name: Create tarball
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip anubis-${{ matrix.os }}-${{ matrix.arch }}.zip anubis-${{ matrix.os }}-${{ matrix.arch }}.exe
          else
            tar -czf anubis-${{ matrix.os }}-${{ matrix.arch }}.tar.gz anubis-${{ matrix.os }}-${{ matrix.arch }}
          fi

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: anubis-${{ matrix.os }}-${{ matrix.arch }}-archive
          path: |
            *.tar.gz
            *.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~1)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-archive'

      - name: List artifacts
        run: ls -la artifacts/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AnubisWatch ${{ github.ref_name }}
          body: |
            ⚖️ **AnubisWatch — The Judgment Never Sleeps**

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            ### Binary
            Download the appropriate binary for your platform and run:
            ```bash
            ./anubis init
            ./anubis serve
            ```

            ### Docker
            ```bash
            docker run -d -p 8443:8443 -v anubis-data:/var/lib/anubis anubiswatch/anubis:${{ github.ref_name }}
            ```

            ## Checksums
            See checksums.txt for SHA256 checksums of all artifacts.
          files: |
            artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            anubiswatch/anubis
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
