# Default values for AnubisWatch
# ═══════════════════════════════════════════════════════════

# Number of replicas (for cluster mode)
replicaCount: 1

# Container image configuration
image:
  repository: ghcr.io/anubiswatch/anubiswatch
  pullPolicy: IfNotPresent
  tag: "latest"

# Image pull secrets
imagePullSecrets: []

# Deployment name override
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  httpPort: 8443
  raftPort: 7946
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: anubis.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: anubiswatch-tls
      hosts:
        - anubis.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}

# AnubisWatch configuration
config:
  # Server configuration
  server:
    host: "0.0.0.0"
    port: 8443
    tls:
      enabled: false
      autoCert: false
      acmeEmail: ""

  # Storage configuration
  storage:
    path: "/var/lib/anubis/data"
    retentionDays: 90
    encryptionKey: ""

  # Logging configuration
  logging:
    level: "info"
    format: "json"

  # Cluster configuration (Necropolis)
  necropolis:
    enabled: false
    region: "default"
    clusterSecret: ""

  # Initial souls (monitors)
  souls: []
  # - name: "Example API"
  #   type: http
  #   target: "https://api.example.com/health"
  #   weight: 30s
  #   http:
  #     method: GET
  #     validStatus: [200]

  # Alert channels
  channels: []
  # - name: "ops-slack"
  #   type: slack
  #   enabled: true
  #   slack:
  #     webhookUrl: "${SLACK_WEBHOOK}"

  # Alert rules (verdicts)
  verdicts:
    rules: []
    # - name: "Service Down"
    #   condition:
    #     type: consecutive_failures
    #     threshold: 3
    #   severity: critical
    #   channels: ["ops-slack"]

# Extra environment variables
extraEnvVars: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Probe configuration
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
