apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "anubiswatch.fullname" . }}-config
  labels:
    {{- include "anubiswatch.labels" . | nindent 4 }}
data:
  anubis.yaml: |
    # AnubisWatch Configuration
    # Generated by Helm

    server:
      host: {{ .Values.config.server.host | quote }}
      port: {{ .Values.config.server.port }}
      {{- if .Values.config.server.tls.enabled }}
      tls:
        enabled: true
        auto_cert: {{ .Values.config.server.tls.autoCert }}
        {{- if .Values.config.server.tls.acmeEmail }}
        acme_email: {{ .Values.config.server.tls.acmeEmail | quote }}
        {{- end }}
      {{- end }}

    storage:
      path: {{ .Values.config.storage.path | quote }}
      retention_days: {{ .Values.config.storage.retentionDays }}
      {{- if .Values.config.storage.encryptionKey }}
      encryption:
        enabled: true
        key: {{ .Values.config.storage.encryptionKey | quote }}
      {{- end }}

    logging:
      level: {{ .Values.config.logging.level | quote }}
      format: {{ .Values.config.logging.format | quote }}

    {{- if .Values.config.necropolis.enabled }}
    necropolis:
      enabled: true
      region: {{ .Values.config.necropolis.region | quote }}
      bind_addr: "0.0.0.0:7946"
    {{- end }}

    souls:
      {{- toYaml .Values.config.souls | nindent 6 }}

    channels:
      {{- toYaml .Values.config.channels | nindent 6 }}

    verdicts:
      {{- toYaml .Values.config.verdicts | nindent 6 }}
