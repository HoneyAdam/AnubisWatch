# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anubiswatch.fullname" . }}-headless
  labels:
    {{- include "anubiswatch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.config.server.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 7946
      targetPort: raft
      protocol: TCP
      name: raft
    - port: 7946
      targetPort: gossip
      protocol: UDP
      name: gossip
  selector:
    {{- include "anubiswatch.selectorLabels" . | nindent 4 }}
---
# Regular service for external access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anubiswatch.fullname" . }}
  labels:
    {{- include "anubiswatch.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.raftPort }}
      targetPort: raft
      protocol: TCP
      name: raft
  selector:
    {{- include "anubiswatch.selectorLabels" . | nindent 4 }}
