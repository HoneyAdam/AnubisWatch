version: "2"

run:
  timeout: 5m
  exclude-dirs:
    - web/
    - vendor/

linters:
  default: none
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - bodyclose
    - noctx
    - misspell
    - gosec
    - asciicheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/AnubisWatch/anubiswatch
  govet:
    enable:
      - nilness
      - shadow
      - unusedwrite
    disable:
      - fieldalignment
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude:
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
    - "G104: Errors unhandled"
    - "exported (type|method|function) (.+) should have comment or be unexported"
    - "ST1000: at least one file in a package should have a package comment"
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
