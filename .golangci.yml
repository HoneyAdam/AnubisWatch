version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - gofmt
    - govet
    - staticcheck
    - bodyclose
    - misspell
  exclude-files:
    - _test\.go$
    - internal/statuspage/handler.go
    - internal/cluster/manager_test.go
    - internal/probe/grpc.go
    - internal/raft/discovery_test.go
    - internal/journey/executor_test.go
    - internal/probe/tls_test.go
    - internal/acme/manager_test.go
    - internal/api/rest_test.go
    - cmd/anubis/main_test.go
    - internal/probe/tls.go
    - internal/storage/raft_log.go
    - internal/probe/icmp.go
